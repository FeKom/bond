server:
  port: 8080

spring:
  application:
    name: bond
  datasource:
    url: jdbc:postgresql://localhost:5432/bond
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
        jdbc:
          '[batch_size]': 20
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms

# Rate Limit Configuration
rate-limit:
  default:
    requests: 1000
    period: 3600

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: read-only

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
# Logging (opcional)
logging:
  level:
    '[com.ratelimiter]': DEBUG
    '[org.springframework.data.redis]': WARN
