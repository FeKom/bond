spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  # Desabilita OAuth2 para testes
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Desabilita segurança para testes E2E
management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    github.fekom.bond: INFO
